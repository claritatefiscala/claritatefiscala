  <rect x="60" y="420" width="300" height="130" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(74,222,128,0.4)" stroke-width="1.5"/>
  <text x="86" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">📋</text>
  <text x="120" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#4ade80">GHID D212 · 2026</text>
  <text x="86" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Ghid complet depunere · 21 pagini</text>
  <text x="86" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ Capitol I (2025) + Capitol II (2026)</text>
  <text x="86" y="516" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ Ghid SPV online · greșeli frecvente</text>
  <text x="86" y="536" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(74,222,128,0.5)" text-decoration="line-through">99 lei</text>

  <!-- Card 2 -->
  <rect x="440" y="420" width="300" height="130" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="466" y="452" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">📊</text>
  <text x="500" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">CALCULATOR TAXE PFA</text>
  <text x="466" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Excel · 3 file · 2026</text>
  <text x="466" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ CAS, CASS și impozit calculat</text>
  <text x="466" y="516" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ Verifici calculele din D212</text>
  <text x="466" y="536" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(167,139,250,0.5)" text-decoration="line-through">69 lei</text>


  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="700" cy="100" r="200" fill="none" stroke="rgba(74,222,128,0.08)" stroke-width="1.5"/>
  <circle cx="100" cy="730" r="230" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Banner sus cu termen -->
  <rect x="0" y="0" width="800" height="52" fill="rgba(74,222,128,0.15)"/>
  <rect x="0" y="49" width="800" height="2" fill="rgba(74,222,128,0.4)"/>
  <text x="400" y="33" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#4ade80">⚡ PACHET DUO · D212 COMPLET · Termen: 25 MAI 2026</text>

  <!-- Linie -->
  <rect x="60" y="94" width="80" height="3" fill="url(#green)" rx="2"/>

  <!-- Label -->
  <text x="60" y="136" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2.5" fill="#4ade80">CALCULATOR + GHID D212 · ECONOMISEȘTI 19 LEI</text>


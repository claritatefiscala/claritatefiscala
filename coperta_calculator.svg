  <!-- Mock calculator visual -->
  <rect x="60" y="445" width="310" height="130" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="80" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Venit net anual</text>
  <text x="80" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">90.000 lei</text>
  <rect x="80" y="508" width="270" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="80" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Impozit venit</text>
  <text x="280" y="530" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#a78bfa">6.885 lei</text>
  <text x="80" y="552" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">CAS + CASS</text>
  <text x="280" y="552" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#a78bfa">21.150 lei</text>
  <text x="80" y="565" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">(exemplu ilustrativ, sistem real)</text>


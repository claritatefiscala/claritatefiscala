  </defs>

  <rect width="800" height="800" fill="url(#bg3)"/>

  <!-- Decoratiuni -->
  <circle cx="680" cy="130" r="190" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <circle cx="680" cy="130" r="130" fill="none" stroke="rgba(167,139,250,0.07)" stroke-width="1"/>
  <circle cx="100" cy="700" r="210" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Linie sus -->
  <rect x="60" y="70" width="120" height="3" fill="url(#accent3)" rx="2"/>

  <!-- Eticheta -->
  <text x="60" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#a78bfa">INSTRUMENT EXCEL</text>


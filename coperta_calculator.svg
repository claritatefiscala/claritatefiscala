  <text x="420" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#a78bfa">✓</text>
  <text x="442" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Normă de venit, Sistem real, PFA vs SRL</text>

  <text x="420" y="500" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#a78bfa">✓</text>
  <text x="442" y="500" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Plafoane CAS și CASS actualizate 2026</text>

  <text x="420" y="528" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#a78bfa">✓</text>
  <text x="442" y="528" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Compatibil Excel + Google Sheets</text>

  <text x="420" y="556" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#a78bfa">✓</text>
  <text x="442" y="556" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Rezultate instant, fără formule</text>


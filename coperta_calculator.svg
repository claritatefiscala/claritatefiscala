  <text x="60" y="692" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Informații cu caracter orientativ. Consultă un expert fiscal pentru situația ta specifică.</text>

  <!-- Badge format -->
  <rect x="610" y="636" width="130" height="44" rx="8" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1"/>
  <text x="675" y="653" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#a78bfa" font-weight="600">FIȘIER EXCEL</text>
  <text x="675" y="671" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">.xlsx descărcabil</text>

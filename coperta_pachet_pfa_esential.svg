  <text x="466" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Excel · 3 file · 2026</text>
  <text x="466" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ Sistem real, normă, PFA vs SRL</text>
  <text x="466" y="516" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">✓ Rezultate instant · fără formule</text>

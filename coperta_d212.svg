  <text x="680" y="708" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4ade80" font-weight="600">21 PAGINI</text>
  <text x="680" y="726" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">PDF descărcabil</text>

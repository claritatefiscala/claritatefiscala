  <rect width="800" height="800" fill="url(#bg2)"/>

  <!-- Decoratiuni -->
  <circle cx="700" cy="100" r="200" fill="none" stroke="rgba(74,222,128,0.08)" stroke-width="1"/>
  <circle cx="700" cy="100" r="140" fill="none" stroke="rgba(74,222,128,0.06)" stroke-width="1"/>
  <circle cx="80" cy="730" r="220" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Linie sus -->

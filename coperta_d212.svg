  <text x="60" y="548" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#4ade80">✓</text>
  <text x="82" y="548" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)">Calculator CAS, CASS și impozit — exemple reale</text>

  <text x="60" y="576" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#4ade80">✓</text>
  <text x="82" y="576" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.85)">Depunere online prin SPV — ghid vizual</text>

  <text x="60" y="604" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#4ade80">✓</text>
